data:
  start_date: "2024-01-01"
  end_date: "2024-03-31"
  input_window: 24
  horizons: [1, 6, 12, 24]
  target_col: temperature_2m
  feature_cols:
    - temperature_2m
    - relative_humidity_2m
    - wind_speed_10m
    - wind_direction_10m
    - surface_pressure
  train_ratio: 0.7
  val_ratio: 0.15

graph:
  distance_threshold_km: 80

model:
  hidden_dim: 64
  gcn_out_dim: 64
  temporal_hidden_dim: 64
  dropout: 0.3

train:
  seed: 42
  epochs: 12
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  device: cpu